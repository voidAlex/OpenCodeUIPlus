name: Release OpenCodeUIPlus Client

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-desktop:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: '--target aarch64-apple-darwin'
            arch: aarch64
            os: macos
          - platform: windows-latest
            args: ''
            arch: x86_64
            os: windows

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: 'npm'

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin' || '' }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install frontend dependencies
        run: npm ci

      - name: Build desktop app
        uses: tauri-apps/tauri-action@v0
        with:
          # Built assets will be gathered locally to prevent default github action release collision
          args: ${{ matrix.args }}

      - name: Prepare artifacts
        shell: bash
        run: |
          mkdir -p release-artifacts
          BUNDLE_DIR="src-tauri/target/release/bundle"
          if [[ "${{ matrix.os }}" == "macos" ]]; then
            BUNDLE_DIR="src-tauri/target/${{ matrix.arch }}-apple-darwin/release/bundle"
          fi

          if [[ "${{ matrix.os }}" == "windows" ]]; then
            if [[ -d "$BUNDLE_DIR/nsis" ]]; then
              find "$BUNDLE_DIR/nsis" -name "*.exe" -exec cp {} release-artifacts/ \;
            fi
          elif [[ "${{ matrix.os }}" == "macos" ]]; then
            if [[ -d "$BUNDLE_DIR/dmg" ]]; then
              find "$BUNDLE_DIR/dmg" -name "*.dmg" -exec cp {} release-artifacts/ \;
            fi
          fi

          echo "Artifacts to upload:"
          ls -R release-artifacts

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: artifacts-desktop-${{ matrix.os }}-${{ matrix.arch }}
          path: release-artifacts
          if-no-files-found: warn
          retention-days: 1

  publish-release:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    needs: [build-desktop]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Display structure of downloaded files
        run: ls -R artifacts

      - name: Extract changelog for this version
        id: changelog
        run: |
          TAG="${{ github.ref_name }}"
          if [ -f CHANGELOG.md ]; then
            BODY=$(sed -n "/^## \[${TAG}\]/,/^## \[/{ /^## \[${TAG}\]/d; /^## \[/d; p; }" CHANGELOG.md)
            BODY=$(echo "$BODY" | sed -e '/./,$!d' -e :a -e '/^\n*$/{$d;N;ba;}')
          else
            BODY=""
          fi

          if [ -z "$BODY" ]; then
            BODY="Release for ${TAG}."
          fi

          echo "$BODY" > /tmp/release-body.md
          printf '\n---\n\n**Clients:** Windows (.exe), macOS Apple Silicon (.dmg)\n' >> /tmp/release-body.md

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: 'OpenCodeUIPlus ${{ github.ref_name }}'
          body_path: /tmp/release-body.md
          files: artifacts/*
          draft: false
          prerelease: ${{ contains(github.ref_name, 'canary') || contains(github.ref_name, 'alpha') || contains(github.ref_name, 'beta') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
